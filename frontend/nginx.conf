# ==================== AI 数字员工前端 Nginx 配置 ====================
#
# 功能：
# - Gzip 压缩
# - 静态文件缓存策略
# - /api 反向代理到后端
# - SPA 路由 fallback
# - 安全 headers
#

server {
    # ==================== 基础配置 ====================
    # 监听端口
    listen 80;
    listen [::]:80;
    
    # 服务器名称（Docker 环境中使用 localhost 或容器名）
    server_name localhost;
    
    # 字符编码
    charset utf-8;
    
    # 静态文件根目录
    root /usr/share/nginx/html;
    
    # 默认首页文件
    index index.html;
    
    # ==================== Gzip 压缩配置 ====================
    # 启用 Gzip 压缩
    gzip on;
    
    # 设置压缩级别（1-9，越高压缩率越大但 CPU 消耗也越大）
    gzip_comp_level 5;
    
    # 最小压缩文件大小（小于此值的文件不压缩）
    gzip_min_length 256;
    
    # 启用压缩的 MIME 类型
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;
    
    # 在响应中添加 Vary: Accept-Encoding 头
    gzip_vary on;
    
    # 对代理请求也启用压缩
    gzip_proxied any;
    
    # ==================== 安全 Headers ====================
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS 过滤（现代浏览器已内置）
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 引用策略（控制 Referer 头的发送）
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ==================== API 反向代理 ====================
    # 将 /api 请求转发到后端服务
    location /api {
        # 后端服务地址（Docker 网络中使用服务名）
        proxy_pass http://backend:8000;
        
        # 代理超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 传递原始请求信息到后端
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用代理缓冲（用于实时 API）
        proxy_buffering off;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # ==================== 静态文件缓存策略 ====================
    # HTML 文件：不缓存（确保获取最新版本）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }
    
    # 带 hash 的静态资源：长期缓存
    # Vite 构建的文件名包含 hash，内容变化时文件名也会变
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # 图片和字体文件：中期缓存
    location ~* \.(ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    
    # ==================== SPA 路由 Fallback ====================
    # Vue Router 历史模式支持
    location / {
        # 尝试按以下顺序查找文件：
        # 1. 精确匹配 URI
        # 2. 作为目录查找
        # 3. 回退到 index.html（SPA 入口）
        try_files $uri $uri/ /index.html;
    }
    
    # ==================== 错误页面 ====================
    # 404 错误重定向到首页（SPA 处理路由）
    error_page 404 /index.html;
    
    # 50x 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # ==================== 禁止访问隐藏文件 ====================
    # 防止访问 .git, .env 等敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
